<!-- ===== 团队介绍 ===== -->

    </div>

    <div style="display:flex;flex-wrap:wrap;gap:32px;justify-content:center;max-width:1000px;margin:0 auto;">

                <svg viewBox="0 0 64 64" width="50" height="50" fill="none" stroke="var(--premium-gold)" stroke-width="1.2"><circle cx="32" cy="24" r="10"/><path d="M16 52c0-10 7.2-16 16-16s16 6 16 16"/></svg>
            </div>
            <div style="font-family:'Noto Serif SC',serif;font-size:20px;font-weight:700;color:var(--premium-dark-900);margin-bottom:6px;">主席</div>
            <div style="font-size:15px;font-weight:600;color:var(--premium-dark-800);margin-bottom:4px;"><!-- 姓名 --></div>
            <div style="font-size:13px;color:var(--premium-light-muted);line-height:1.6;margin-top:12px;"><!-- 简介 --></div>
        </div>

        <!-- 秘书长 -->
        <div style="width:280px;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.06);text-align:center;padding:40px 24px 32px;">

                <svg viewBox="0 0 64 64" width="50" height="50" fill="none" stroke="var(--premium-gold)" stroke-width="1.2"><circle cx="32" cy="24" r="10"/><path d="M16 52c0-10 7.2-16 16-16s16 6 16 16"/></svg>

            <div style="font-family:'Noto Serif SC',serif;font-size:20px;font-weight:700;color:var(--premium-dark-900);margin-bottom:6px;">秘书长</div>
            <div style="font-size:15px;font-weight:600;color:var(--premium-dark-800);margin-bottom:4px;"><!-- 姓名 --></div>
            <div style="font-size:13px;color:var(--premium-light-muted);line-height:1.6;margin-top:12px;"><!-- 简介 --></div>
        </div>

        <!-- 名誉主席 -->
        <div style="width:280px;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,0.06);text-align:center;padding:40px 24px 32px;">
